<!DOCTYPE html>
<html>
<head>
<title>Jenil Dekivadia</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
}

/* Animated purple background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background: linear-gradient(45deg,#6a0dad,#8a2be2,#4b0082,#9400d3);
background-size:400% 400%;
animation:bg 10s infinite;
z-index:-1;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:orange;
font-size:60px;
margin-bottom:20px;
}

/* photo style */
img{
width:250px;
height:250px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 0 25px black;
}

</style>
</head>

<body>

<h1>Jenil Dekivadia</h1>

<img src="jenil.png" alt="Jenil">

</body>
</html>
